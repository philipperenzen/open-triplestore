# cargo-deny configuration. Run locally with `cargo deny check`.
# CI runs `cargo deny check advisories bans sources` (see .github/workflows/ci.yml).

[advisories]
version = 2
# RustSec advisory IDs ignored with justification. Revisit as upstream patches land.
ignore = [
    # Unmaintained transitive crates — no patched release exists; pulled in via build
    # macros / TLS helpers. No exploit path in this project; listed for tracking.
    "RUSTSEC-2024-0384",  # instant — unmaintained (transitive)
    "RUSTSEC-2024-0370",  # proc-macro-error — unmaintained (build-time derive macros)
    "RUSTSEC-2025-0134",  # rustls-pemfile — unmaintained (transitive TLS helper)
    # Unsoundness advisories in transitive crates; this project does not exercise the
    # unsound code paths.
    "RUSTSEC-2026-0002",  # `IterMut` Stacked-Borrows unsoundness (transitive)
    "RUSTSEC-2026-0097",  # rand — unsound only with a custom rng logger (not used here)
    # Vulnerabilities reached only through OPTIONAL features that are OFF by default
    # (`saml` via samael, `alerting` via lettre, and their TLS/crypto stack). Tracked
    # for upgrade; the rsa "Marvin" advisory currently has no fixed upstream release.
    "RUSTSEC-2023-0071",  # rsa — Marvin timing side-channel (no upstream fix; via `saml`)
    "RUSTSEC-2026-0141",  # TLS hostname verification (Boring TLS backend; via `alerting`)
    "RUSTSEC-2026-0049",  # rustls-webpki — certificate/CRL validation (transitive TLS)
    "RUSTSEC-2026-0098",  # rustls-webpki — name constraints (URI) (transitive TLS)
    "RUSTSEC-2026-0099",  # rustls-webpki — name constraints (wildcard) (transitive TLS)
    "RUSTSEC-2026-0104",  # rustls-webpki — reachable panic in CRL parsing (transitive TLS)
]

[bans]
# Duplicate dependency versions are common in large trees; surface them as a
# warning rather than a hard failure.
multiple-versions = "warn"
wildcards = "warn"
# Allow build-only wildcard from path/git deps if any appear later.
allow-wildcard-paths = true

[sources]
# Only crates.io is trusted by default; flag anything pulled from an unknown
# registry or git source.
unknown-registry = "deny"
unknown-git = "deny"

# Dependency licenses ARE enforced in CI (`cargo deny check ... licenses`).
# The two workspace crates are source-available (AGPL-3.0 + Commons Clause — a
# non-SPDX license declared via `license-file`); they are `publish = false`, so
# `private.ignore` skips them here. This allow-list governs third-party deps only.
[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    # Community Data License Agreement — permissive; used by webpki-roots for the
    # bundled Mozilla CA certificate set (data, not code).
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
