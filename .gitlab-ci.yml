# GitLab CI/CD for Open Triplestore.
#
# Mirrors the GitHub Actions workflows (.github/workflows/ci.yml, perf.yml,
# perf-baseline.yml, release.yml + e2e.yml) so a fork hosted on any GitLab
# instance (gitlab.com or self-managed) gets the same gates: rustfmt + clippy +
# build + test (incl. conformance & security suites), the frontend
# lint/test/build, the cargo-deny supply-chain audit (advisories, bans, sources,
# licenses), an npm production-dependency audit, a gitleaks secret scan, the
# performance-regression gate, and a tag-driven release. Commands and versions
# track the GitHub jobs, with two intentional differences: (1) the GitLab perf
# jobs install python3 explicitly, which the GitHub ubuntu-latest runner already
# ships (see the perf job below); and (2) the rust job here keeps
# `--all-features`, so — since ci.yml switched to an explicit feature list — this
# is the only CI that actually compiles the `sfcgal3d` feature (hence the extra
# libsfcgal-dev native dep in before_script). That feature is also why every
# rust job runs on a *trixie*-based image: the `sfcgal`/`sfcgal-sys` crates
# (0.8.x/0.9.x) need native SFCGAL >= 2.0 at build time, and Debian bookworm
# only packages libsfcgal 1.4.1 (its headers lack the 2.x API, so the sfcgal
# crate fails with E0432 unresolved imports); trixie ships 2.0.0.

stages:
  - check
  - test
  - perf
  - audit
  - release

variables:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # Keep the cargo home inside the project so it can be cached between pipelines.
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  GIT_DEPTH: "20"

# ── Rust: format, lint, build, test ───────────────────────────────────────────
# `cargo test --all-features` runs the unit, integration, conformance AND
# security-regression suites (which ci.yml surfaces as separate jobs).
rust:
  stage: test
  # trixie, not bookworm: `--all-features` pulls in sfcgal-sys, which needs
  # native SFCGAL >= 2.0 (bookworm's libsfcgal-dev 1.4.1 is too old — see the
  # header note). And 1.91, not 1.88: the lockfile pins wide 1.5 / safe_arch
  # 1.0 (MSRV rustc 1.89), so 1.88 can no longer build it; 1.91 matches the
  # Dockerfile builder stage. The other rust jobs use the same image so the
  # shared cache below never mixes distros, and the "-trixie" in the key
  # retires the bookworm-era caches (their -sys build-script probes point at
  # the old distro's system libs) instead of inheriting them.
  image: rust:1.91-trixie
  cache:
    key: "rust-trixie-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  before_script:
    # GEOS for GeoSPARQL; SFCGAL for the `sfcgal3d` feature (pulled in by
    # `--all-features` below — sfcgal-sys is a `-sys` crate that needs the native
    # SFCGAL >= 2.0 headers at build time, hence the trixie image); the rest
    # match the GitHub backend job (SAML/xmlsec, TLS). Without libsfcgal-dev the
    # `--all-features` build fails.
    - apt-get update -qq
    - apt-get install -y -qq libgeos-dev libsfcgal-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld
    - rustup component add rustfmt clippy
  script:
    - cargo fmt --all --check
    - cargo clippy --all-targets --all-features
    - cargo build --all-features --locked
    - cargo test --all-features --locked

# ── Performance-regression GATE (mirrors .github/workflows/perf.yml) ──────────
# Subset Criterion bench + a comparison against the committed baseline. Runs on
# merge requests and on pushes to main/develop/release/*. Sample sizes are
# hard-coded in benches/performance.rs, so the name filter (not --sample-size)
# controls runtime.
perf:
  stage: perf
  # Same trixie image as the rust job (shared cache key — see the note there).
  image: rust:1.91-trixie
  cache:
    key: "rust-trixie-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
  before_script:
    # GEOS + the usual native deps, matching the GitHub backend job, PLUS
    # python3, which the GitHub ubuntu-latest runner already ships. The
    # rust:1.91-trixie image happens to include python3 today, but we install it
    # explicitly rather than depend on the base image's incidental contents.
    # This added `python3` is the one intentional GitHub/GitLab difference (the
    # perf script is invoked the same way on both).
    - apt-get update -qq
    - apt-get install -y -qq libgeos-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld python3
  script:
    - cargo bench --bench performance --features full -- 'query|path|geosparql'
    - python3 scripts/perf_regression.py check --criterion-dir target/criterion --baseline benches/perf_baseline.json --github-summary

# ── Performance baseline refresh (mirrors .github/workflows/perf-baseline.yml) ─
# Full Criterion suite → regenerated baseline as a CI artifact. Runs on `v*`
# tags and on manual/web triggers. Committing the baseline back to the repo
# needs a project access token, so GitLab keeps this artifact-only — GitHub is
# the canonical source that opens the baseline-refresh PR.
perf-baseline:
  stage: perf
  # Same trixie image as the rust job (shared cache key — see the note there).
  image: rust:1.91-trixie
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  cache:
    key: "rust-trixie-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/git/
      - target/
  before_script:
    # Same native deps as the perf job, plus python3 (see the perf job note).
    - apt-get update -qq
    - apt-get install -y -qq libgeos-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld python3
  script:
    - cargo bench --bench performance --features full
    - python3 scripts/perf_regression.py update --criterion-dir target/criterion --out benches/perf_baseline.json --runner "gitlab-ci/$CI_RUNNER_DESCRIPTION" --keep-tolerances
  artifacts:
    paths:
      - benches/perf_baseline.json
    expire_in: 90 days

# ── Frontend: lint, test, build ───────────────────────────────────────────────
frontend:
  stage: test
  image: node:20-bookworm
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
    - npm run test
    - npm run build

# ── Supply-chain audit: cargo-deny (advisories, bans, sources, licenses) ──────
cargo-deny:
  stage: audit
  # Same trixie image as the other rust jobs (one image to pull per runner).
  image: rust:1.91-trixie
  cache:
    key: "deny-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/bin/
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq pkg-config libssl-dev
    - cargo install cargo-deny --locked --version ^0.16
  script:
    - cargo deny check advisories bans sources licenses

# ── npm audit (production dependencies, high severity) ────────────────────────
npm-audit:
  stage: audit
  image: node:20-bookworm
  script:
    - cd frontend
    - npm audit --audit-level=high --omit=dev

# ── Secret scan (gitleaks; same version + flags as the GitHub job) ────────────
secret-scan:
  stage: check
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl ca-certificates tar
  script:
    - VER=8.18.4
    - curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
    - ./gitleaks detect --source . --no-git --redact --verbose --exit-code 1

# ── Browser e2e (mirrors e2e.yml). Manual/opt-in: browser e2e is environment-
# sensitive on self-managed runners, so it does not gate the pipeline. Trigger it
# from the pipeline view when wanted. ─────────────────────────────────────────
e2e:
  stage: test
  image: rust:1.91-trixie
  when: manual
  allow_failure: true
  variables:
    CI: "true"
    JWT_SECRET: "e2e_jwt_secret_must_be_32_chars_xx"
    RATE_LIMIT_DISABLED: "1"
    OTS_BACKEND_CMD: "../target/debug/open-triplestore --bind 127.0.0.1 --port 7878 --data-dir ./e2e-data --log-level warn"
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq libgeos-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld curl
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
  script:
    - cargo build --features "rdf-12,owl2-rl,owl2-el,owl2-ql,owl2-dl,text-search,ldp,shex,swrl"
    - cd frontend
    - npm ci
    - npx playwright install --with-deps chromium
    - npm run e2e

# ── Release (mirrors .github/workflows/release.yml) ───────────────────────────
# On a `v*` tag, extract the matching CHANGELOG section and publish a GitLab
# Release. Container images are published from the GitHub workflow (GHCR); GitLab
# stays release-notes-only here for parity. CI_COMMIT_TAG is e.g. "v0.2.1"; the
# bare version (stripped "v") is what the "## [X.Y.Z]" headers use.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  script:
    - ver="${CI_COMMIT_TAG#v}"
    - echo "Extracting notes for version $ver"
    - |
      hdr="## [$ver]"
      # Fixed-string match (index, not regex): portable across awk implementations.
      awk -v hdr="$hdr" '
        index($0, hdr) == 1               { capture = 1; next }
        capture && index($0, "## [") == 1 { exit }
        capture                           { print }
      ' CHANGELOG.md > release_notes.md
    - test -s release_notes.md || { echo "No CHANGELOG section for [$ver]"; exit 1; }
    - cat release_notes.md
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Open Triplestore $CI_COMMIT_TAG"
    description: release_notes.md
