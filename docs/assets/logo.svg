<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f5563"/>
      <stop offset="100%" stop-color="#0d2a32"/>
    </linearGradient>
    <radialGradient id="glow" cx="32%" cy="22%" r="70%">
      <stop offset="0%" stop-color="#7ED6D0" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#7ED6D0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" gradientUnits="userSpaceOnUse" x1="13" y1="11" x2="51" y2="55">
      <stop offset="0%" stop-color="#cdf6f1"/>
      <stop offset="48%" stop-color="#7ED6D0"/>
      <stop offset="100%" stop-color="#56b6bd"/>
    </linearGradient>
    <radialGradient id="node" cx="0.34" cy="0.28" r="0.85">
      <stop offset="0%" stop-color="#d4f7f2"/>
      <stop offset="45%" stop-color="#6fcdc9"/>
      <stop offset="100%" stop-color="#2F7A8C"/>
    </radialGradient>
  </defs>

  <!-- Rounded frame / background -->
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#tile)"/>
  <rect x="3" y="3" width="58" height="58" rx="15" fill="url(#glow)"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="14.5" fill="none" stroke="#7ED6D0" stroke-opacity="0.30" stroke-width="1"/>

  <!-- Knowledge-graph edges (triangle between the three nodes) -->
  <g stroke="#dbf7f3" stroke-opacity="0.5" stroke-width="1.9" stroke-linecap="round">
    <line x1="32" y1="51" x2="48.45" y2="22.5"/>
    <line x1="48.45" y1="22.5" x2="15.55" y2="22.5"/>
    <line x1="15.55" y1="22.5" x2="32" y2="51"/>
  </g>

  <!-- The "O" ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="url(#ring)" stroke-width="4.6"/>

  <!-- Nodes sitting on the ring -->
  <g stroke="#eafdfb" stroke-width="2.1">
    <circle cx="32" cy="51" r="6.4" fill="url(#node)"/>
    <circle cx="48.45" cy="22.5" r="6.4" fill="url(#node)"/>
    <circle cx="15.55" cy="22.5" r="6.4" fill="url(#node)"/>
  </g>
</svg>
