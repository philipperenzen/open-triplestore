<svg xmlns="http://www.w3.org/2000/svg" width="760" height="224" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial" font-size="12">
<rect width="760" height="224" fill="#ffffff"/>
<text x="16" y="24" font-size="15" font-weight="700" fill="#0f172a">Concurrent read latency (shared store, 2-way join)</text>
<text x="16" y="42" font-size="11" fill="#64748b">wall-clock for N parallel queries; lock-free reads scale sublinearly</text>
<line x1="168.0" y1="52" x2="168.0" y2="190" stroke="#eef2f7"/>
<text x="168.0" y="204" font-size="9" fill="#94a3b8" text-anchor="middle">0.00 µs</text>
<line x1="293.0" y1="52" x2="293.0" y2="190" stroke="#eef2f7"/>
<text x="293.0" y="204" font-size="9" fill="#94a3b8" text-anchor="middle">154 µs</text>
<line x1="418.0" y1="52" x2="418.0" y2="190" stroke="#eef2f7"/>
<text x="418.0" y="204" font-size="9" fill="#94a3b8" text-anchor="middle">307 µs</text>
<line x1="543.0" y1="52" x2="543.0" y2="190" stroke="#eef2f7"/>
<text x="543.0" y="204" font-size="9" fill="#94a3b8" text-anchor="middle">461 µs</text>
<line x1="668.0" y1="52" x2="668.0" y2="190" stroke="#eef2f7"/>
<text x="668.0" y="204" font-size="9" fill="#94a3b8" text-anchor="middle">614 µs</text>
<text x="160" y="70.5" text-anchor="end" fill="#334155" font-size="11">1 thread</text>
<rect x="168" y="58" width="159.1" height="17" rx="2" fill="#2563eb"/>
<text x="332.1" y="71" font-size="10" fill="#475569">196 µs</text>
<text x="160" y="103.5" text-anchor="end" fill="#334155" font-size="11">2 threads</text>
<rect x="168" y="91" width="199.1" height="17" rx="2" fill="#2563eb"/>
<text x="372.1" y="104" font-size="10" fill="#475569">245 µs</text>
<text x="160" y="136.5" text-anchor="end" fill="#334155" font-size="11">4 threads</text>
<rect x="168" y="124" width="294.6" height="17" rx="2" fill="#2563eb"/>
<text x="467.6" y="137" font-size="10" fill="#475569">362 µs</text>
<text x="160" y="169.5" text-anchor="end" fill="#334155" font-size="11">8 threads</text>
<rect x="168" y="157" width="500.0" height="17" rx="2" fill="#2563eb"/>
<text x="673.0" y="170" font-size="10" fill="#475569">614 µs</text>
<text x="748" y="20" font-size="10" fill="#94a3b8" text-anchor="end">lower is better</text>
</svg>