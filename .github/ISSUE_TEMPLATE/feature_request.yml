name: Feature request
description: Suggest an idea or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? For non-trivial changes, please open this **before** sending a
        pull request so we can discuss the approach (see
        [CONTRIBUTING.md](../../CONTRIBUTING.md)).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? What are you trying to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about, and why they fall short.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, mock-ups, or examples.
