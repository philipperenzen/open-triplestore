# Release automation: fires on each annotated `v*` tag pushed to `main`.
#
# 1. release-notes — extracts the matching `## [X.Y.Z]` section from CHANGELOG.md
#    and publishes a GitHub Release with those notes.
# 2. publish-image — builds the 3-stage Dockerfile (already `--features full`)
#    and pushes it to GHCR (ghcr.io/philipperenzen/open-triplestore).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-notes:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Extract the CHANGELOG section for this tag. GITHUB_REF_NAME is e.g.
      # "v0.2.1"; strip the leading "v" to get the bare version used in the
      # "## [X.Y.Z]" headers, then awk out everything up to the next "## [".
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          echo "Extracting notes for version: $ver"
          hdr="## [$ver]"
          # Fixed-string match (index, not regex): a dynamic-regex "\\[" is dropped
          # to a bare "[" (char class) by some awk builds and silently matches nothing.
          awk -v hdr="$hdr" '
            index($0, hdr) == 1               { capture = 1; next }
            capture && index($0, "## [") == 1 { exit }
            capture                           { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error::No CHANGELOG.md section found for [$ver]. Add a '## [$ver]' entry before tagging."
            exit 1
          fi
          echo "----- release_notes.md -----"
          cat release_notes.md

      # Non-fatal nudge: a release ought to call out security-relevant and
      # deprecation changes. Warn (don't fail) if those subsections are missing.
      - name: Check for Security/Deprecated sections
        shell: bash
        run: |
          if ! grep -q '^### Security' release_notes.md; then
            echo "::warning::Release notes have no '### Security' section — confirm there were no security-relevant changes."
          fi
          if ! grep -q '^### Deprecated' release_notes.md; then
            echo "::warning::Release notes have no '### Deprecated' section — confirm nothing was deprecated this release."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: release_notes.md
          name: "Open Triplestore ${{ github.ref_name }}"
          # A tag like v0.2.1-rc.1 contains a hyphen → mark it a pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-image:
    name: Build & push container image
    runs-on: ubuntu-latest
    needs: release-notes
    # Skip on forks: they lack the GHCR package and would fail the push.
    if: github.repository == 'philipperenzen/open-triplestore'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE: the very first push creates the GHCR package as *private*. A
      # maintainer must set its visibility to public once (Packages → settings)
      # for anonymous `docker pull` to work.
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/philipperenzen/open-triplestore
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # The 3-stage Dockerfile already builds the server with `--features full`,
      # so no build-args are needed here.
      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
