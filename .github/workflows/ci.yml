name: CI

on:
  # `develop` is intentionally NOT in this push list: every change reaches it via a
  # PR that already runs CI, and the develop→main release PR runs it again — keeping
  # `develop` here would fire a second, identical run on every push while that PR is
  # open. PRs (below) cover all branches.
  push:
    branches: [main, master, 'release/**']
  pull_request:

# Collapse superseded runs: a new push/PR-update on the same ref cancels the
# in-flight one. push (refs/heads/*) and PR (refs/pull/*/merge) have distinct refs,
# so a push never cancels a PR's required check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # The `--features full,test-utils,backup-encrypt,alerting` debug build of every test binary fills the runner's small
  # disk ("No space left on device"; the "ld terminated with signal 7 [Bus error]"
  # crash is the same thing — a bus error from mmap on a full disk). Shrink target/:
  # line-tables-only debuginfo (keeps file:line in backtraces) and no incremental
  # artifacts. The heavy jobs additionally reclaim ~25 GB of preinstalled runner
  # tooling in a "Free up disk space" step.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  CARGO_INCREMENTAL: "0"

jobs:
  backend:
    name: Rust (build, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Reclaim ~25 GB of preinstalled tooling the Rust build doesn't need, so the
      # `--features full,test-utils,backup-encrypt,alerting` build of all test binaries doesn't run the disk out.
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
            /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /

      - name: Install system dependencies (GEOS for GeoSPARQL, xmlsec1 for SAML)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libsfcgal-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Hard gate: the tree is fully rustfmt-clean. Run `cargo fmt --all`
      # before pushing if this fails.
      - name: Format check
        run: cargo fmt --all --check

      # `plugin-hello` rides along with the main feature set (not a separate job) so
      # the compile-time plugin architecture — and its cycle-free crate wiring
      # (plugins/api / plugins/hello, src/plugins.rs) — is exercised on every CI run,
      # same as any other optional capability. The plugin crates ALSO build/test
      # standalone at their own default features in the "Plugin crates" job below.
      - name: Clippy
        run: cargo clippy --all-targets --features full,test-utils,backup-encrypt,alerting,plugin-hello

      - name: Build
        run: cargo build --features full,test-utils,backup-encrypt,alerting,plugin-hello --locked

      - name: Test
        run: cargo test --features full,test-utils,backup-encrypt,alerting,plugin-hello --locked

      # Explicit, named gate for the security regression suite. These also run in
      # the step above; surfacing them separately makes a security regression
      # obvious in the CI summary. The `security` filter yields a "0 passed; N
      # filtered out" line for every binary that has no security tests (the
      # conformance suites, etc.) — that is expected. What is NOT acceptable is the
      # filter matching *nothing at all* (e.g. after a rename), which `cargo test`
      # would still exit 0 on. The guard below fails the job if too few security
      # tests actually ran, so the suite can never be silently skipped.
      - name: Security regression tests
        shell: bash
        run: |
          set -o pipefail
          out=$(cargo test --features full,test-utils,backup-encrypt,alerting,plugin-hello --locked security 2>&1)
          echo "$out"
          passed=$(printf '%s\n' "$out" | grep -oE '[0-9]+ passed' | awk '{s+=$1} END{print s+0}')
          echo "==> security-named tests passed across all binaries: $passed"
          if [ "$passed" -lt 40 ]; then
            echo "::error::Expected at least 40 security tests to run, but only $passed did — the 'security' filter may be broken (tests renamed/moved). Failing to avoid a silent skip."
            exit 1
          fi

  plugins:
    name: Plugin crates (standalone, default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Plugin crates (plugins/api, plugins/hello — see docs/plugins.md) are
      # deliberately independent of the main crate (no dependency on it — see
      # ots-plugin-api's crate docs for why), so they get their own lightweight
      # job: no GEOS/SFCGAL/libxmlsec system deps, no giant feature matrix. This
      # is the "each plugin crate builds/tests on its own, at its own default
      # features" guarantee — the "backend" job separately exercises plugin-hello
      # wired INTO the main crate via the `plugin-hello` feature.
      - name: Clippy (plugin crates)
        run: cargo clippy -p ots-plugin-api -p ots-plugin-hello --all-targets

      - name: Build & test (plugin crates)
        run: cargo test -p ots-plugin-api -p ots-plugin-hello --locked

  conformance:
    name: Conformance suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Reclaim ~25 GB of preinstalled tooling so the `--features full,test-utils,backup-encrypt,alerting` conformance
      # test binaries don't run the disk out (see the backend job).
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
            /usr/local/share/powershell /usr/share/swift
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libsfcgal-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # W3C / GeoSPARQL / OWL2 / LDP conformance tests. Enabling all features
      # exercises the optional reasoning, ldp, shex, swrl and text-search paths.
      - name: Run conformance tests
        run: cargo test --features full,test-utils,backup-encrypt,alerting --locked --test '*conformance*'

  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Rust advisories, license, and ban checks (config in deny.toml).
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check advisories bans sources licenses

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: npm audit (production deps, high severity)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

  # Blocking secret scan: a `.env`, an `ots_` API token, a JWT secret, or any high-entropy
  # credential that slips past .gitignore must fail CI.
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: gitleaks
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --redact --verbose --exit-code 1
