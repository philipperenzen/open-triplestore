# Performance-regression GATE (authoritative).
#
# Runs a fast subset of the Criterion benchmark suite on every PR (and on pushes
# to main/release/**) and compares it against the committed baseline at
# benches/perf_baseline.json via scripts/perf_regression.py. The script exits 0
# (within tolerance), 1 (regression — fails the job), or 2 (baseline/usage
# error). This is the canonical perf check; the baseline itself is refreshed only
# by perf-baseline.yml (never from PR runs) so PRs can't drift the reference.
#
# Path filters keep docs-only PRs from paying the (slow, native) build+bench cost.
# Caveat: if this job is later promoted to a *required* status check, GitHub
# treats a path-skipped run as "not satisfied" rather than "passed", so a
# docs-only PR would be blocked. That is a branch-protection / repo-settings
# decision — if you make it required, pair it with a path-aware allowance.
#
# Note: Criterion sample sizes are hard-coded in benches/performance.rs, so the
# run time is controlled by the benchmark *name filter* below (query/path/
# geosparql), NOT by a --sample-size flag.
name: Performance

on:
  pull_request:
    paths:
      - 'src/**'
      - 'opengraph/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/perf_regression.py'
      - '.github/workflows/perf.yml'
  # `develop` is intentionally NOT here: every change reaches it through a PR that
  # already runs this gate, and the develop→main release PR runs it again — listing
  # `develop` would fire a second, identical run on every push while that PR is open.
  push:
    branches: [main, 'release/**']
    paths:
      - 'src/**'
      - 'opengraph/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/perf_regression.py'
      - '.github/workflows/perf.yml'

# Collapse superseded runs: a new push/PR-update on the same ref cancels the
# in-flight one. push (refs/heads/*) and PR (refs/pull/*/merge) have distinct refs,
# so a push never cancels a PR's required check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  perf:
    name: Performance regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system dependencies (GEOS for GeoSPARQL, xmlsec1 for SAML)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev cmake pkg-config libclang-dev libssl-dev libxmlsec1-dev lld

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Subset run: the name filter (query/path/geosparql) selects the fast,
      # representative benchmarks. Sample sizes live in benches/performance.rs.
      - name: Run benchmark subset
        run: cargo bench --bench performance --features full -- 'query|path|geosparql'

      # ubuntu-latest ships python3. Compares the fresh Criterion estimates
      # against the committed baseline; non-zero exit fails the gate.
      - name: Check for performance regressions
        run: python3 scripts/perf_regression.py check --criterion-dir target/criterion --baseline benches/perf_baseline.json --github-summary
