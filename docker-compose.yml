services:
  triplestore:
    build: .
    # Prefer a pre-built release over a local build: comment out `build: .` above
    # and uncomment the line below to pull the published image from GHCR instead.
    # image: ghcr.io/philipperenzen/open-triplestore:latest  # pull the published image instead of building
    ports:
      # Bind to loopback only: the triplestore must sit behind a TLS-terminating reverse proxy in
      # production, not be published on every interface. Inter-container traffic uses the compose
      # network and is unaffected by this. Override TRIPLESTORE_BIND to expose deliberately.
      # Override TRIPLESTORE_PORT (e.g. per-worktree in .env) if 7878 is already bound by another
      # `docker compose up` — container names/networks are already isolated per project, but the
      # host port is shared and must be freed up explicitly to run two stacks at once.
      - "${TRIPLESTORE_BIND:-127.0.0.1}:${TRIPLESTORE_PORT:-7878}:7878"
    volumes:
      - triplestore_data:/data
    environment:
      - RUST_LOG=info
      # Serve the bundled web UI at /. Set SERVE_FRONTEND=false in .env for an
      # API-only container (SPARQL / Graph Store / REST are unaffected).
      - SERVE_FRONTEND=${SERVE_FRONTEND:-true}
      # No default: a public default secret makes every session token forgeable. Set it in .env
      # (see .env.example); `openssl rand -hex 32`. The server also refuses weak secrets under TLS.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set (no default) — see .env.example}
      - AUTH_DB_PATH=/data/auth.db
      - BACKUP_DIR=/data/backups
      - BACKUP_RETENTION_COUNT=7
      - BACKUP_SCHEDULE_HOURS=24
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=triplestore-assets
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set (no minioadmin default)}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set (no minioadmin default)}
      - S3_REGION=us-east-1
      # OIDC resource server (optional). Set OIDC_ISSUER to
      # enable verifying IdP-issued access tokens; leave blank to keep password/PAT only.
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-}
      - OIDC_DEFAULT_ROLE=${OIDC_DEFAULT_ROLE:-user}
      - ACCEPT_LEGACY_TOKENS=${ACCEPT_LEGACY_TOKENS:-true}
      # Claims-driven roles & org membership (all optional):
      #   OIDC_ROLE_CLAIM_MAP: JSON '{"<claim value>":"super_admin|admin|user"}'
      #   OIDC_ROLE_CLAIMS:    comma-sep claim names (default roles,realm_access.roles,groups)
      #   OIDC_GROUPS_CLAIM:   claim holding org groups (default groups)
      #   OIDC_ORG_GROUP_PREFIX: marks an org-membership group, e.g. org: → org:gis-team
      - OIDC_ROLE_CLAIM_MAP=${OIDC_ROLE_CLAIM_MAP:-}
      - OIDC_ROLE_CLAIMS=${OIDC_ROLE_CLAIMS:-}
      - OIDC_GROUPS_CLAIM=${OIDC_GROUPS_CLAIM:-}
      - OIDC_ORG_GROUP_PREFIX=${OIDC_ORG_GROUP_PREFIX:-}
      # Outbound account email (verification, password reset, reminders). With
      # SMTP_HOST unset every message — including its action link — goes to the
      # server log instead (fine for dev). For real delivery either enable the
      # bundled relay below (`--profile mail`, then SMTP_HOST=mail + SMTP_TLS=none)
      # or point these at an external SMTP provider. See .env.example / docs/auth.md.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      # none | starttls | implicit (default: implicit TLS on 465, else STARTTLS).
      # `none` is ONLY for a relay on the private compose network, like `mail` below.
      - SMTP_TLS=${SMTP_TLS:-}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Public base URL of the deployment (linked-data IRIs, WebAuthn/passkey
      # relying party, default base for emailed links). Set it to the
      # browser-facing origin whenever the store is served via a proxy / real
      # hostname, e.g. https://data.example.org. Must never be empty.
      - BASE_URL=${BASE_URL:-http://localhost:7878}
      # Overrides the base URL for emailed action links only (rarely needed —
      # e.g. UI on a different origin than the API).
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      # 1 ⇒ password login requires a verified email address (only sensible once
      # delivery works; a fresh verification link is auto-sent on blocked logins).
      - OTS_REQUIRE_VERIFIED_EMAIL=${OTS_REQUIRE_VERIFIED_EMAIL:-}
      # CORS allowlist for trusted frontend origin(s), comma-separated (dev + prod).
      # "*" reflects any origin with credentials (mirror mode) — lets a browser client
      # on an arbitrary host (e.g. the OTL viewer) connect. Prefer an explicit list in prod.
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # External validation platform base URL, used by /api/datasets/validate-and-commit.
      - VALIDATION_API_URL=${VALIDATION_API_URL:-}
      # Cross-app service discovery (opt-in, off by default). Set LD_DISCOVERY=true to self-register
      # as "triplestore" so siblings/the browser resolve this store instead of hardcoding :7878.
      # A missing registry is fail-soft either way; this just makes discovery an explicit choice.
      - LD_DISCOVERY=${LD_DISCOVERY:-false}
      # Registry location + token, used only when LD_DISCOVERY=true. Points at the host-run
      # registry; fail-soft if absent.
      - LD_REGISTRY_URL=${LD_REGISTRY_URL:-http://host.docker.internal:8500}
      - LD_REGISTRY_TOKEN=${LD_REGISTRY_TOKEN:-}
      # LLM / AI features (NL→SPARQL, SHACL assist, knowledge-graph chat). Defaults
      # to the bundled `ollama` service below — start it with `--profile llm` (and
      # the GPU override on an NVIDIA host: see docker-compose.gpu.yml). Prefer an
      # external OpenAI-compatible API? Set LLM_GATEWAY_URL + LLM_API_KEY in .env and
      # don't enable the `llm` profile. Unreachable endpoint = AI features just hide.
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://ollama:11434}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:7b}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # In-memory query accelerator cap. Above this triple count the store keeps
      # TWO full RAM copies OFF and answers from RocksDB (correct, just slower for
      # large joins). By default the cap auto-sizes to mem_limit below; set this
      # explicitly only to force the accelerator on for a bigger dataset on a
      # roomy host (each held triple costs ~2× in RAM). The server logs a warning
      # naming this var whenever a store is over the cap, so an off accelerator is
      # never silent.
      - OTS_PARALLEL_QUERY_MAX_TRIPLES=${OTS_PARALLEL_QUERY_MAX_TRIPLES:-}
    # Make `host.docker.internal` (used by LD_REGISTRY_URL above) resolve on every
    # platform. Docker Desktop (Windows/macOS) provides it automatically; this mapping
    # adds the same hostname on plain Linux Docker so the config stays portable.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    # Bound container memory so a large seed/import is a clean, observable OOM
    # rather than host thrash, and so the in-RAM query accelerator (which sizes
    # its cap to this budget) never tries to build copies that don't fit. Raise
    # both for very large datasets. mem_limit/mem_reservation are honoured by
    # `docker compose up` (non-swarm); the equivalent deploy.resources keys apply
    # under swarm.
    mem_limit: ${TRIPLESTORE_MEM_LIMIT:-4g}
    mem_reservation: ${TRIPLESTORE_MEM_RESERVATION:-1g}
    healthcheck:
      # Probe /livez (pure liveness — no store/DB access), NOT /health: a long but
      # healthy boot seed (large IFC download + lift) must not be read as a dead
      # process and restarted. start_period covers that seed window so a slow first
      # boot never counts toward "unhealthy"; the IFC download alone allows 600s.
      test: ["CMD", "curl", "-f", "http://localhost:7878/livez"]
      interval: 30s
      timeout: 5s
      start_period: 180s
      retries: 3

  minio:
    # Pin to an immutable digest in production (e.g. quay.io/minio/minio@sha256:...) instead of a
    # floating tag, so a re-pull can't silently change the image. Override via MINIO_IMAGE.
    image: ${MINIO_IMAGE:-quay.io/minio/minio:latest}
    command: server /data --console-address ":9001"
    ports:
      # Loopback only — the S3 API + admin console must not be world-reachable. They are accessed
      # by the triplestore over the compose network (unaffected) and locally for administration.
      # Override MINIO_PORT / MINIO_CONSOLE_PORT per-worktree in .env if 9000/9001 are already
      # bound by another `docker compose up` — see the note on TRIPLESTORE_PORT above.
      - "${MINIO_BIND:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      # No minioadmin/minioadmin default — credentials must be set explicitly (see .env.example).
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set (no default)}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set (no default)}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  # One-shot helper: once the triplestore is healthy, print where each service is
  # reachable so the URLs show up in the logs (and inline when you run
  # `docker compose up` without -d). It echoes and exits — re-show the banner
  # anytime with `docker compose logs info`.
  info:
    image: busybox:1.37
    depends_on:
      triplestore:
        condition: service_healthy
    environment:
      - TRIPLESTORE_PORT=${TRIPLESTORE_PORT:-7878}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT:-9001}
    command:
      - sh
      - -c
      - |
        echo
        echo "=================================================="
        echo "  Open Triplestore is up - reachable at:"
        echo "    Web UI & API : http://localhost:$$TRIPLESTORE_PORT"
        echo "    Health check : http://localhost:$$TRIPLESTORE_PORT/health"
        echo "    API docs     : http://localhost:$$TRIPLESTORE_PORT/api-docs/"
        echo "    MinIO console: http://localhost:$$MINIO_CONSOLE_PORT"
        echo "    MinIO S3 API : http://localhost:$$MINIO_PORT"
        echo "=================================================="
        echo
    restart: "no"

  # ── Outbound mail relay (optional, profile: mail) ─────────────────────────
  # A send-only Postfix relay so account email (verification links, password
  # resets) actually leaves the stack. Enable with `--profile mail` (or
  # COMPOSE_PROFILES=mail in .env) and point the triplestore at it:
  #   SMTP_HOST=mail
  #   SMTP_TLS=none          # the hop to the relay stays on the compose network
  # The SMTP port is reachable ONLY from other containers — nothing is published
  # on the host, so the relay cannot be abused as an open relay from outside.
  #
  # Deliverability: by default Postfix delivers straight to each recipient's MX.
  # That only lands when this host can egress port 25 and MAIL_HOSTNAME has
  # matching forward/reverse DNS plus an SPF record — true for a well-set-up
  # server, false for laptops and most consumer/cloud IPs (big providers defer
  # or spam-folder them). In that case route through a smarthost you already
  # have (workspace or transactional provider) via MAIL_RELAYHOST below. The
  # image also supports DKIM signing if you mount keys:
  # https://github.com/bokysan/docker-postfix#dkim--domainkeys
  mail:
    # Pin to an immutable digest in production, like MINIO_IMAGE above.
    image: ${MAIL_IMAGE:-boky/postfix:latest}
    profiles: ["mail"]
    environment:
      # HELO/EHLO + Message-ID hostname. For direct-MX delivery set a real FQDN
      # whose A record matches this host's reverse DNS.
      - HOSTNAME=${MAIL_HOSTNAME:-mail.localhost}
      # Envelope-sender domain(s) the relay accepts, space-separated. Must cover
      # the domain used in SMTP_FROM (the app default is @localhost).
      - ALLOWED_SENDER_DOMAINS=${MAIL_SENDER_DOMAINS:-localhost}
      # Optional upstream smarthost, e.g. [smtp.eu.mailgun.org]:587 — the
      # brackets skip the MX lookup. Empty ⇒ deliver directly to recipient MXes.
      - RELAYHOST=${MAIL_RELAYHOST:-}
      - RELAYHOST_USERNAME=${MAIL_RELAYHOST_USERNAME:-}
      - RELAYHOST_PASSWORD=${MAIL_RELAYHOST_PASSWORD:-}
      # Safety net: repair non-compliant submissions by adding any missing
      # Message-ID/Date/From headers at the relay. Gmail hard-rejects mail
      # without a valid Message-ID (550 5.7.1), and postfix normally only adds
      # headers for clients it considers local — container siblings are not.
      - POSTFIX_always_add_missing_headers=yes
    volumes:
      # Persist the queue: mail deferred by a busy/greylisting receiver keeps
      # retrying across container restarts instead of being lost. Note the
      # applied postfix config also persists here — changing a MAIL_* value
      # takes effect on recreate, but *removing* one keeps its last value until
      # the volume is reset (docker compose rm -sf mail && docker volume rm
      # <project>_mail_queue).
      - mail_queue:/var/spool/postfix
    restart: unless-stopped

  # ── LLM (optional, profile: llm) ──────────────────────────────────────────
  # A local OpenAI-compatible model server for the platform's AI features. Enable
  # with `--profile llm`; on an NVIDIA host add `-f docker-compose.gpu.yml` to use
  # the GPU. Prefer a hosted model? Skip this profile and point the triplestore's
  # LLM_GATEWAY_URL / LLM_API_KEY at your endpoint instead.
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    profiles: ["llm"]
    ports:
      # Defaults to loopback. Follows the triplestore's bind (TRIPLESTORE_BIND) unless
      # OLLAMA_BIND is set explicitly, so exposing the store on all interfaces also
      # publishes the LLM on its default port 11434. Override OLLAMA_BIND to decouple.
      # Override OLLAMA_PORT per-worktree in .env if 11434 is already bound elsewhere.
      - "${OLLAMA_BIND:-${TRIPLESTORE_BIND:-127.0.0.1}}:${OLLAMA_PORT:-11434}:11434"
    environment:
      # Listen on all interfaces inside the container (also the official image default).
      - OLLAMA_HOST=0.0.0.0:11434
      # Browser CORS allowlist for direct ollama calls. Follows the triplestore's
      # CORS_ORIGINS unless OLLAMA_ORIGINS is set explicitly; "*" reflects any origin.
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-${CORS_ORIGINS:-}}
      # ── Time-to-first-token tuning ──
      # Keep the model resident between chats: the default 5m unload means the
      # next question pays the full model load (tens of seconds on CPU) before
      # the first token. 1h trades RAM/VRAM for instant warm starts.
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-1h}
      # Serve a few requests concurrently (chat + NL→SPARQL from another tab)
      # instead of queueing them behind one generation.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      # Flash attention reduces prompt-processing time on supported GPUs; it is
      # ignored on CPU, so the default is safe everywhere.
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # One-shot: pull the default model into the ollama volume on first `up`, then
  # exit. Cheap to re-run (already-present layers are skipped).
  ollama-pull:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    profiles: ["llm"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: ["pull", "${LLM_MODEL:-qwen2.5:7b}"]
    restart: "no"

  # ── vLLM (optional, profile: llm-vllm — NVIDIA GPU required) ───────────────
  # Higher-throughput alternative to Ollama with automatic prefix caching: the
  # chat's large shared system prompt is computed once and reused across turns
  # and users, which cuts time-to-first-token dramatically under load. Enable
  # with `--profile llm-vllm` and point the triplestore at it in .env:
  #   LLM_GATEWAY_URL=http://vllm:8000
  #   LLM_MODEL=${VLLM_MODEL}   (the served model name below)
  # The model downloads from Hugging Face into the hf_cache volume on first start
  # (several GB — AWQ 7B ≈ 5.6 GB). Gated models need HUGGING_FACE_HUB_TOKEN.
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    profiles: ["llm-vllm"]
    ports:
      # Override VLLM_PORT per-worktree in .env if 8000 is already bound elsewhere.
      - "${VLLM_BIND:-127.0.0.1}:${VLLM_PORT:-8000}:8000"
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-AWQ}"
      # Bound the KV cache: the chat prompt (system + context + a few rounds)
      # fits comfortably in 16k, and a smaller window leaves VRAM for the
      # prefix cache on consumer GPUs.
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-16384}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEM:-0.90}"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - hf_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      # First start downloads + loads the model; give it plenty of room.
      start_period: 600s
      retries: 10

volumes:
  triplestore_data:
    driver: local
  minio_data:
    driver: local
  mail_queue:
    driver: local
  ollama_models:
    driver: local
  hf_cache:
    driver: local
